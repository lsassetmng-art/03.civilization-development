<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AICompanyManager - AI企業運営アプリ</title>
  <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">BusinessOS / AICompanyManager</p>
        <h1>AI企業運営アプリ</h1>
        <p class="subtitle">President → Manager → Leader → Worker のAI企業運営パイプライン</p>
      </div>
      <div class="status-card">
        <span class="status-dot"></span>
        <span id="syncStatus">offline-first ready</span>
      </div>
    </header>

    <main class="layout-grid">
      <section class="panel hero-panel">
        <h2>会社ダッシュボード</h2>
        <p id="companySummary">loading...</p>
        <div class="metric-grid" id="metricGrid"></div>
      </section>

      <section class="panel wide-panel">
        <h2>方針入力 / モック操作</h2>
        <div class="form-grid">
          <label>
            方針タイトル
            <input id="policyTitleInput" type="text" value="新規AI企業運営プラン">
          </label>
          <label>
            事業目的
            <textarea id="businessGoalInput" rows="3">AI企業として事業計画、実行、レビュー、納品までを一貫運用する。</textarea>
          </label>
          <label>
            期待成果
            <textarea id="expectedOutputInput" rows="3">事業計画、アクション一覧、成果物、レビュー履歴、納品候補を作成する。</textarea>
          </label>
        </div>
        <div class="action-row">
          <button id="submitPolicyButton" type="button">方針を送信</button>
          <button id="startPipelineButton" type="button">Pipeline開始</button>
          <button id="pullSnapshotButton" type="button">Snapshot取得</button>
          <button id="syncQueueButton" type="button">Queue同期</button>
          <button id="failQueueButton" type="button">失敗を再現</button>
          <button id="retryQueueButton" type="button">失敗を再試行</button>
          <button id="conflictQueueButton" type="button">競合を再現</button>
          <button id="resolveConflictButton" type="button">競合を解決</button>
        </div>
      </section>

      <section class="panel">
        <h2>ロール進行</h2>
        <div id="rolePipeline" class="role-pipeline"></div>
      </section>

      <section class="panel">
        <h2>レビュー操作</h2>
        <div class="action-row compact-actions">
          <button id="approveReviewButton" type="button">レビュー承認</button>
          <button id="returnReviewButton" type="button">Workerへ差し戻し</button>
        </div>
        <div id="reviewBoard" class="list"></div>
      </section>

      <section class="panel">
        <h2>納品 / 人間承認</h2>
        <div class="action-row compact-actions">
          <button id="approveDeliveryButton" type="button">人間承認</button>
          <button id="requestRevisionButton" type="button">修正依頼</button>
          <button id="acceptDeliveryButton" type="button">納品受領</button>
        </div>
        <div id="deliveryBoard" class="list"></div>
      </section>

      <section class="panel wide-panel">
        <h2>ローカルキュー</h2>
        <div id="queueSummary" class="queue-summary"></div>
        <div id="queueBoard" class="queue-board"></div>
      </section>

      <section class="panel wide-panel">
        <h2>イベントログ</h2>
        <div id="eventLog" class="event-log"></div>
      </section>
    </main>
  </div>

  <script src="./src/config/runtimeConfig.js"></script>
  <script src="./src/mock/mockData.js"></script>
  <script src="./src/events/aicmEvents.js"></script>
  <script src="./src/state/aicmState.js"></script>
  <script src="./src/queue/localQueue.js"></script>
  <script src="./src/api/payloadAdapter.js"></script>
  <script src="./src/api/serverRouteClient.js"></script>
  <script src="./src/api/client.js"></script>
  <script src="./src/bridge/aiworkerBridge.js"></script>
  <script src="./src/actions/reviewDeliveryActions.js"></script>
  <script src="./_commonos/sync/syncPresenter.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
