<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NameCardManager Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>NameCardManager</h1>
      <p>Capture / Relationships / Company Timeline runtime dashboard</p>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Capture Inbox</h2>
      <div id="captureInbox"></div>
    </section>

    <section class="panel">
      <h2>Relationship Summary</h2>
      <div id="relationshipSummary"></div>
    </section>

    <section class="panel panel-wide">
      <h2>Company Timeline</h2>
      <div id="companyTimeline"></div>
    </section>

    <section class="panel panel-wide">
      <h2>Selected Card Detail</h2>
      <div id="selectedCard"></div>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
