<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PocketSecretary CommonOS Bootstrap</title>
  <link rel="stylesheet" href="bootstrap.css">
</head>
<body>
  <main class="bootstrap-shell">
    <header class="bootstrap-header">
      <h1>PocketSecretary</h1>
      <p>CommonOS bootstrap shell</p>
    </header>

    <section class="bootstrap-panel">
      <h2>Launch Profile</h2>
      <div id="launchProfile"></div>
    </section>

    <section class="bootstrap-panel">
      <h2>Connected Routes</h2>
      <div id="connectedRoutes"></div>
    </section>

    <section class="bootstrap-panel bootstrap-panel-wide">
      <h2>Bootstrap Summary</h2>
      <div id="bootstrapSummary"></div>
    </section>
  </main>

  <script src="bootstrap.js"></script>
</body>
</html>
