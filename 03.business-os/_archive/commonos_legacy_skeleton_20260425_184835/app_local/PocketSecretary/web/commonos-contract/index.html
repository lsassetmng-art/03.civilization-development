<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PocketSecretary CommonOS Contract</title>
  <link rel="stylesheet" href="contract.css">
</head>
<body>
  <main class="contract-shell">
    <header class="contract-header">
      <h1>PocketSecretary</h1>
      <p>CommonOS non-UI contract shell</p>
    </header>

    <section class="contract-panel">
      <h2>Sync / Retry</h2>
      <div id="syncRetry"></div>
    </section>

    <section class="contract-panel">
      <h2>Queue Visual</h2>
      <div id="queueVisual"></div>
    </section>

    <section class="contract-panel">
      <h2>Client Capabilities</h2>
      <div id="clientCapabilities"></div>
    </section>

    <section class="contract-panel">
      <h2>Accessibility</h2>
      <div id="accessibility"></div>
    </section>
  </main>

  <script src="contract.js"></script>
</body>
</html>
