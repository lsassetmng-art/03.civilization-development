<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PocketSecretary CommonOS Transport</title>
  <link rel="stylesheet" href="transport.css">
</head>
<body>
  <main class="transport-shell">
    <header class="transport-header">
      <h1>PocketSecretary</h1>
      <p>CommonOS transport shell</p>
    </header>

    <section class="transport-panel">
      <h2>Request / Trace</h2>
      <div id="requestTrace"></div>
    </section>

    <section class="transport-panel">
      <h2>Pagination Envelope</h2>
      <div id="paginationEnvelope"></div>
    </section>

    <section class="transport-panel">
      <h2>Error Envelope</h2>
      <div id="errorEnvelope"></div>
    </section>

    <section class="transport-panel">
      <h2>Sync Status Naming</h2>
      <div id="syncStatusNaming"></div>
    </section>
  </main>

  <script src="transport.js"></script>
</body>
</html>
