<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NameCardManager CommonOS Entry</title>
  <link rel="stylesheet" href="entry.css">
</head>
<body>
  <main class="entry-shell">
    <header class="entry-header">
      <h1>NameCardManager</h1>
      <p>CommonOS entry shell for shared component usage.</p>
    </header>

    <section class="entry-panel">
      <h2>Common Component Usage</h2>
      <div id="componentUsage"></div>
    </section>

    <section class="entry-panel">
      <h2>Variant Usage</h2>
      <div id="variantUsage"></div>
    </section>

    <section class="entry-panel entry-panel-wide">
      <h2>Queue Presentation Boundary</h2>
      <div id="queueBoundary"></div>
    </section>
  </main>

  <script src="entry.js"></script>
</body>
</html>
