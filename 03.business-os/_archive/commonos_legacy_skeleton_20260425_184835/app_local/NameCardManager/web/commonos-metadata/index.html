<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NameCardManager CommonOS Metadata</title>
  <link rel="stylesheet" href="metadata.css">
</head>
<body>
  <main class="metadata-shell">
    <header class="metadata-header">
      <h1>NameCardManager</h1>
      <p>CommonOS metadata shell</p>
    </header>

    <section class="metadata-panel">
      <h2>Locale Keys</h2>
      <div id="localeKeys"></div>
    </section>

    <section class="metadata-panel">
      <h2>Screen Templates</h2>
      <div id="screenTemplates"></div>
    </section>

    <section class="metadata-panel">
      <h2>Help / Notification</h2>
      <div id="helpNotification"></div>
    </section>

    <section class="metadata-panel">
      <h2>Attachment / Export</h2>
      <div id="attachmentExport"></div>
    </section>
  </main>

  <script src="metadata.js"></script>
</body>
</html>
