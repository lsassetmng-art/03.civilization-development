<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NameCardManager CommonOS Local Queue</title>
  <link rel="stylesheet" href="local-queue.css">
</head>
<body>
  <main class="queue-shell">
    <header class="queue-header">
      <h1>NameCardManager</h1>
      <p>CommonOS local queue shell</p>
    </header>

    <section class="queue-panel">
      <h2>Sync Triggers</h2>
      <div id="syncTriggers"></div>
    </section>

    <section class="queue-panel">
      <h2>Retry States</h2>
      <div id="retryStates"></div>
    </section>

    <section class="queue-panel">
      <h2>Queue Kinds</h2>
      <div id="queueKinds"></div>
    </section>

    <section class="queue-panel">
      <h2>Storage Strategy</h2>
      <div id="storageStrategy"></div>
    </section>
  </main>

  <script src="local-queue.js"></script>
</body>
</html>
