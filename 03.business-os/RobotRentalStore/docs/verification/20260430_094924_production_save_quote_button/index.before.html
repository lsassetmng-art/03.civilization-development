<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RobotRentalStore - ロボットレンタル</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --line: #dfe3ee;
      --text: #172033;
      --muted: #667085;
      --accent: #335cff;
      --soft: #eef2ff;
      --danger: #fff1f2;
      --warn: #fff7ed;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    header { padding: 28px; background: linear-gradient(135deg, #101828, #263b88); color: white; }
    header h1 { margin: 0 0 8px; font-size: 28px; }
    header p { margin: 0; color: #d7defa; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .badge { display: inline-flex; padding: 6px 10px; border-radius: 999px; font-size: 12px; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22); }
    main { display: grid; grid-template-columns: 280px minmax(0, 1fr) 340px; gap: 18px; padding: 18px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: 0 10px 30px rgba(15,23,42,.06); }
    .panel h2 { margin: 0 0 12px; font-size: 16px; }
    label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 12px; font-weight: 700; }
    select, input, button { width: 100%; min-height: 40px; border-radius: 12px; border: 1px solid var(--line); padding: 8px 10px; font: inherit; background: white; }
    button { cursor: pointer; border: 0; background: var(--accent); color: white; font-weight: 700; }
    button.secondary { background: var(--soft); color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
    .card { border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: white; }
    .card h3 { margin: 0 0 4px; font-size: 16px; }
    .meta { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
    .chip { font-size: 12px; border-radius: 999px; padding: 4px 8px; background: var(--soft); color: #283a8f; }
    .chip.conversation { background: #fdf2f8; color: #9d174d; }
    .chip.combat { background: var(--warn); color: #9a3412; }
    .price { margin: 12px 0; font-weight: 800; font-size: 18px; }
    .note { border-radius: 14px; padding: 10px; font-size: 12px; line-height: 1.55; color: #344054; background: #f8fafc; border: 1px solid var(--line); }
    .note.warn { background: var(--warn); }
    .note.danger { background: var(--danger); }
    .detail-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .summary-row { display: flex; justify-content: space-between; gap: 10px; margin: 8px 0; font-size: 14px; }
    .summary-row strong { font-size: 18px; }
    .status { margin-top: 10px; font-size: 12px; color: #d7defa; }
    @media (max-width: 1040px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>ロボットレンタル</h1>
    <p>仕事・雑談・接客・補助に使えるAIロボットを選んでレンタルします。</p>
    <div class="badges">
      <span class="badge">BusinessOS</span>
      <span class="badge">WorkerRentalCore</span>
      <span class="badge">API-connected</span>
      <span class="badge">civilization_id-aware</span>
    </div>
    <div id="apiStatus" class="status">API確認中...</div>
  </header>

  <main>
    <aside class="panel">
      <h2>絞り込み</h2>

      <label>API Base</label>
      <input id="apiBase" value="http://127.0.0.1:9020" />

      <label>Civilization ID</label>
      <input id="civilizationId" value="00000000-0000-4000-8000-000000000001" />

      <label>シリーズ</label>
      <select id="seriesFilter">
        <option value="">すべて</option>
        <option value="HD">HD</option>
        <option value="LoVerS">LoVerS</option>
        <option value="Beyond">Beyond</option>
        <option value="MEGAMI">MEGAMI</option>
      </select>

      <label>ロール</label>
      <select id="roleFilter">
        <option value="">すべて</option>
        <option>Worker</option>
        <option>Helper</option>
        <option>Leader</option>
        <option>Manager</option>
        <option>Advisor</option>
        <option>Specialist</option>
        <option>Friend</option>
        <option>Lover</option>
        <option>Butler</option>
        <option>Security</option>
        <option>CombatSpecialist</option>
        <option>TacticalLeader</option>
        <option>StrategicCommander</option>
      </select>

      <label>検索</label>
      <input id="searchInput" placeholder="型番・機種名・用途" />

      <div style="height:12px"></div>
      <button class="secondary" onclick="loadCatalog()">カタログ再読込</button>

      <div style="height:14px"></div>
      <div class="note">catalogはglobal read-only。quote dry-runのみ X-Civilization-Id を使います。</div>
    </aside>

    <section class="panel">
      <h2>レンタル可能ロボット</h2>
      <div id="cardGrid" class="grid"></div>
    </section>

    <aside class="panel">
      <h2>選択中</h2>
      <div id="detail"></div>

      <label>レンタル単位</label>
      <select id="unit">
        <option value="hour">時間</option>
      </select>

      <label>数量</label>
      <input id="qty" type="number" value="1" min="1" />

      <label>期間</label>
      <input id="duration" type="number" value="1" min="1" />

      <div style="height:12px"></div>
      <div class="summary-row"><span>小計</span><span id="subtotal">-</span></div>
      <div class="summary-row"><span>無料チケット</span><span>未適用</span></div>
      <div class="summary-row"><span><strong>合計</strong></span><strong id="total">-</strong></div>

      <div style="height:12px"></div>
      <button onclick="makeQuote()">見積を作成</button>
      <div style="height:8px"></div>
      <button class="secondary" onclick="alert('契約確定APIは次フェーズです')">申込確認へ進む</button>
    </aside>
  </main>

  <script>
    const fallbackRobots = [
      { model_code: "HD-R3", model_name_ja: "ワーカー", series_code: "HD", manufacturer_code: "helios_dynamics", role_codes: ["Worker"], starting_price_jpy: 500, rental_units: ["hour","day","month"], safety_group: "business", short_description: "汎用AIワーカー。", safety_note: "業務系ロールです。" },
      { model_code: "LVS-12Fv015", model_name_ja: "ビジネスヤンデレ", series_code: "LoVerS", manufacturer_code: "lavi_corporation", role_codes: ["Lover"], starting_price_jpy: 500, rental_units: ["minute","hour"], safety_group: "conversation", short_description: "擬似恋人型演出ロール。", safety_note: "実在恋愛・成人向け性的サービス・監視・脅し・依存誘導は禁止です。" },
      { model_code: "HD-R2S", model_name_ja: "スナイパー", series_code: "HD", manufacturer_code: "helios_dynamics", role_codes: ["CombatSpecialist","Security","Battler"], starting_price_jpy: 800, rental_units: ["hour","day"], safety_group: "combat_security_crisis", short_description: "戦闘専門系。", safety_note: "現実の危害実行支援ではなく、フィクション・警備設計・危機対応・世界観用途に限定します。" }
    ];

    let robots = [];
    let selected = null;

    function apiBase() {
      return document.getElementById("apiBase").value.replace(/\/+$/, "");
    }

    function civilizationHeaders() {
      const civilizationId = document.getElementById("civilizationId").value.trim();
      return civilizationId ? { "X-Civilization-Id": civilizationId } : {};
    }

    function chipClass(role) {
      if (["Friend", "Lover"].includes(role)) return "chip conversation";
      if (["Battler", "Security", "CombatSpecialist", "TacticalLeader", "StrategicCommander"].includes(role)) return "chip combat";
      return "chip";
    }

    async function loadCatalog() {
      const status = document.getElementById("apiStatus");
      try {
        status.textContent = "API読込中...";
        const res = await fetch(`${apiBase()}/api/v1/business/robot-rental/catalog`);
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || "catalog failed");
        robots = json.items || [];
        selected = robots[0] || null;
        status.textContent = `API接続OK / ${robots.length}件`;
      } catch (err) {
        robots = fallbackRobots;
        selected = robots[0];
        status.textContent = `API未接続のためmock表示: ${err.message}`;
      }
      renderCards();
      renderDetail();
    }

    function filteredRobots() {
      const series = document.getElementById("seriesFilter").value;
      const role = document.getElementById("roleFilter").value;
      const search = document.getElementById("searchInput").value.toLowerCase();

      return robots.filter((r) => {
        if (series && r.series_code !== series) return false;
        if (role && !(r.role_codes || []).includes(role)) return false;
        if (search) {
          const text = [
            r.model_code,
            r.model_name_ja,
            r.series_code,
            r.manufacturer_code,
            (r.role_codes || []).join(" "),
            r.short_description
          ].join(" ").toLowerCase();
          if (!text.includes(search)) return false;
        }
        return true;
      });
    }

    function renderCards() {
      const list = filteredRobots();
      document.getElementById("cardGrid").innerHTML = list.map((r) => `
        <article class="card">
          <h3>${r.model_name_ja || r.model_code}</h3>
          <div class="meta">${r.model_code} / ${r.series_code || "-"} / ${r.manufacturer_code || "-"}</div>
          <div>${r.short_description || ""}</div>
          <div class="chips">${(r.role_codes || []).map(role => `<span class="${chipClass(role)}">${role}</span>`).join("")}</div>
          <div class="price">¥${Number(r.starting_price_jpy || 0).toLocaleString()}〜</div>
          <button onclick="selectRobot('${r.model_code}')">詳細を見る</button>
        </article>
      `).join("");
    }

    function selectRobot(code) {
      selected = robots.find((r) => r.model_code === code) || robots[0] || null;
      renderDetail();
    }

    function unitLabel(unit) {
      return { minute: "分", hour: "時間", day: "日", month: "月", year: "年" }[unit] || unit;
    }

    function renderDetail() {
      if (!selected) {
        document.getElementById("detail").innerHTML = `<div class="note">ロボットを選択してください。</div>`;
        return;
      }

      const group = selected.safety_group;
      const safetyClass = group === "combat_security_crisis" ? "warn" : (selected.role_codes || []).includes("Lover") ? "danger" : "";
      const units = selected.rental_units || ["hour"];

      document.getElementById("detail").innerHTML = `
        <div class="detail-title">${selected.model_name_ja || selected.model_code}</div>
        <div class="meta">${selected.model_code} / ${selected.series_code || "-"}</div>
        <div>${selected.short_description || ""}</div>
        <div class="chips">${(selected.role_codes || []).map(role => `<span class="${chipClass(role)}">${role}</span>`).join("")}</div>
        <div class="note ${safetyClass}">${selected.safety_note || ""}</div>
      `;

      document.getElementById("unit").innerHTML = units.map((u) => `<option value="${u}">${unitLabel(u)}</option>`).join("");
      calcLocal();
    }

    function calcLocal() {
      if (!selected) return;
      const qty = Number(document.getElementById("qty").value || 1);
      const duration = Number(document.getElementById("duration").value || 1);
      const subtotal = Number(selected.starting_price_jpy || 0) * qty * duration;
      document.getElementById("subtotal").textContent = `¥${subtotal.toLocaleString()}`;
      document.getElementById("total").textContent = `¥${subtotal.toLocaleString()}`;
    }

    async function makeQuote() {
      if (!selected) return;

      const body = {
        app_code: "RobotRentalStore",
        model_code: selected.model_code,
        role_code: (selected.role_codes || [])[0] || "",
        rental_unit: document.getElementById("unit").value,
        duration_quantity: Number(document.getElementById("duration").value || 1),
        quantity: Number(document.getElementById("qty").value || 1),
        use_free_ticket: false
      };

      try {
        const res = await fetch(`${apiBase()}/api/v1/business/robot-rental/quote`, {
          method: "POST",
          headers: { "content-type": "application/json", ...civilizationHeaders() },
          body: JSON.stringify(body)
        });

        const json = await res.json();
        if (!json.ok) throw new Error(json.error || "quote failed");

        const q = json.quote;
        document.getElementById("subtotal").textContent = `¥${Number(q.subtotal_jpy).toLocaleString()}`;
        document.getElementById("total").textContent = `¥${Number(q.total_jpy).toLocaleString()}`;

        alert(`見積作成OK dry-run\n${q.model_code}\n${q.rental_unit} x ${q.duration_quantity}\nowner_civilization_id: ${json.owner_civilization_id || "未指定"}\npersist_allowed: ${json.persist_allowed}\n合計: ¥${Number(q.total_jpy).toLocaleString()}\nDB保存なし`);
      } catch (err) {
        alert(`見積API失敗: ${err.message}`);
      }
    }

    document.getElementById("seriesFilter").addEventListener("change", renderCards);
    document.getElementById("roleFilter").addEventListener("change", renderCards);
    document.getElementById("searchInput").addEventListener("input", renderCards);
    document.getElementById("qty").addEventListener("input", calcLocal);
    document.getElementById("duration").addEventListener("input", calcLocal);

    loadCatalog();
  </script>
</body>
</html>
