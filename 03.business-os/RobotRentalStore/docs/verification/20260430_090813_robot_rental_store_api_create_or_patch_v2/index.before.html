<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RobotRentalStore - ロボットレンタル</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --line: #dfe3ee;
      --text: #172033;
      --muted: #667085;
      --accent: #335cff;
      --soft: #eef2ff;
      --danger: #fff1f2;
      --warn: #fff7ed;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 28px;
      background: linear-gradient(135deg, #101828, #263b88);
      color: white;
    }
    header h1 { margin: 0 0 8px; font-size: 28px; }
    header p { margin: 0; color: #d7defa; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .badge {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22);
    }
    main {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 340px;
      gap: 18px;
      padding: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 10px 30px rgba(15,23,42,.06);
    }
    .panel h2 { margin: 0 0 12px; font-size: 16px; }
    label {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    select, input, button {
      width: 100%;
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 8px 10px;
      font: inherit;
      background: white;
    }
    button {
      cursor: pointer;
      border: 0;
      background: var(--accent);
      color: white;
      font-weight: 700;
    }
    button.secondary {
      background: var(--soft);
      color: var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: white;
    }
    .card h3 { margin: 0 0 4px; font-size: 16px; }
    .meta { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
    .chip {
      font-size: 12px;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--soft);
      color: #283a8f;
    }
    .chip.conversation { background: #fdf2f8; color: #9d174d; }
    .chip.combat { background: var(--warn); color: #9a3412; }
    .price { margin: 12px 0; font-weight: 800; font-size: 18px; }
    .note {
      border-radius: 14px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.55;
      color: #344054;
      background: #f8fafc;
      border: 1px solid var(--line);
    }
    .note.warn { background: var(--warn); }
    .note.danger { background: var(--danger); }
    .detail-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 8px 0;
      font-size: 14px;
    }
    .summary-row strong { font-size: 18px; }
    @media (max-width: 1040px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>ロボットレンタル</h1>
    <p>仕事・雑談・接客・補助に使えるAIロボットを選んでレンタルします。</p>
    <div class="badges">
      <span class="badge">BusinessOS</span>
      <span class="badge">WorkerRentalCore</span>
      <span class="badge">CommonOS-ready</span>
      <span class="badge">CX知識参照対応</span>
    </div>
  </header>

  <main>
    <aside class="panel">
      <h2>絞り込み</h2>
      <label>シリーズ</label>
      <select id="seriesFilter">
        <option value="">すべて</option>
        <option value="HD">HD</option>
        <option value="LoVerS">LoVerS</option>
        <option value="Beyond">Beyond</option>
        <option value="MEGAMI">MEGAMI</option>
      </select>

      <label>ロール</label>
      <select id="roleFilter">
        <option value="">すべて</option>
        <option>Worker</option>
        <option>Helper</option>
        <option>Leader</option>
        <option>Manager</option>
        <option>Advisor</option>
        <option>Specialist</option>
        <option>Friend</option>
        <option>Lover</option>
        <option>Butler</option>
        <option>Security</option>
        <option>CombatSpecialist</option>
        <option>TacticalLeader</option>
        <option>StrategicCommander</option>
      </select>

      <label>検索</label>
      <input id="searchInput" placeholder="型番・機種名・用途" />

      <div style="height:14px"></div>
      <div class="note">
        role_code は配置分類であり、CX22073JWの知識参照キーでもあります。
      </div>
    </aside>

    <section class="panel">
      <h2>レンタル可能ロボット</h2>
      <div id="cardGrid" class="grid"></div>
    </section>

    <aside class="panel">
      <h2>選択中</h2>
      <div id="detail"></div>

      <label>レンタル単位</label>
      <select id="unit">
        <option value="hour">時間</option>
        <option value="day">日</option>
        <option value="month">月</option>
      </select>

      <label>数量</label>
      <input id="qty" type="number" value="1" min="1" />

      <label>期間</label>
      <input id="duration" type="number" value="1" min="1" />

      <div style="height:12px"></div>
      <div class="summary-row"><span>小計</span><span id="subtotal">-</span></div>
      <div class="summary-row"><span>無料チケット</span><span>未適用</span></div>
      <div class="summary-row"><span><strong>合計</strong></span><strong id="total">-</strong></div>

      <div style="height:12px"></div>
      <button onclick="makeQuote()">見積を作成</button>
      <div style="height:8px"></div>
      <button class="secondary" onclick="alert('次フェーズで confirm API に接続')">申込確認へ進む</button>
    </aside>
  </main>

  <script>
    const robots = [
      {
        model_code: "HD-R3",
        name: "ワーカー",
        series: "HD",
        maker: "Helios Dynamics",
        roles: ["Worker"],
        price: 500,
        group: "business",
        desc: "汎用AIワーカー。実作業・成果物作成・検証補助に向く。"
      },
      {
        model_code: "HD-R1",
        name: "ヘルパー",
        series: "HD",
        maker: "Helios Dynamics",
        roles: ["Helper"],
        price: 300,
        group: "business",
        desc: "秘書・補助・資料整理・通知文面作成に向く。"
      },
      {
        model_code: "LVS-12Fv015",
        name: "ビジネスヤンデレ",
        series: "LoVerS",
        maker: "Lavi Corporation",
        roles: ["Lover"],
        price: 500,
        group: "conversation",
        desc: "擬似恋人型の演出ロール。安全境界を維持したキャラクター商材。"
      },
      {
        model_code: "BYD2-003",
        name: "ASIC Leader3",
        series: "Beyond",
        maker: "ASIC",
        roles: ["President", "Manager", "ExecutiveManager"],
        price: 1200,
        group: "business",
        desc: "統合設計・リスク判断・納品品質統括に向く高機能業務系。"
      },
      {
        model_code: "MG-NORN-001",
        name: "ウルズ",
        series: "MEGAMI",
        maker: "Mathers Garden",
        roles: ["Advisor", "Worker", "Lover"],
        price: 900,
        group: "business",
        desc: "過去重視。前例・歴史・過去実績を踏まえた助言に向く。"
      },
      {
        model_code: "HD-R2S",
        name: "スナイパー",
        series: "HD",
        maker: "Helios Dynamics",
        roles: ["CombatSpecialist", "Security", "Battler"],
        price: 800,
        group: "combat",
        desc: "戦闘専門系。フィクション、警備設計、危機対応、世界観用途に限定。"
      }
    ];

    let selected = robots[0];

    function chipClass(role) {
      if (["Friend", "Lover"].includes(role)) return "chip conversation";
      if (["Battler", "Security", "CombatSpecialist", "TacticalLeader", "StrategicCommander"].includes(role)) return "chip combat";
      return "chip";
    }

    function renderCards() {
      const series = document.getElementById("seriesFilter").value;
      const role = document.getElementById("roleFilter").value;
      const search = document.getElementById("searchInput").value.toLowerCase();

      const filtered = robots.filter((r) => {
        if (series && r.series !== series) return false;
        if (role && !r.roles.includes(role)) return false;
        if (search && !`${r.model_code} ${r.name} ${r.series} ${r.roles.join(" ")}`.toLowerCase().includes(search)) return false;
        return true;
      });

      document.getElementById("cardGrid").innerHTML = filtered.map((r) => `
        <article class="card">
          <h3>${r.name}</h3>
          <div class="meta">${r.model_code} / ${r.series} / ${r.maker}</div>
          <div>${r.desc}</div>
          <div class="chips">${r.roles.map(role => `<span class="${chipClass(role)}">${role}</span>`).join("")}</div>
          <div class="price">¥${r.price.toLocaleString()}〜</div>
          <button onclick="selectRobot('${r.model_code}')">詳細を見る</button>
        </article>
      `).join("");
    }

    function selectRobot(code) {
      selected = robots.find((r) => r.model_code === code) || robots[0];
      renderDetail();
    }

    function renderDetail() {
      const safety = selected.group === "combat"
        ? `<div class="note warn">戦闘/警備/危機対応系です。現実の危害実行支援ではなく、フィクション・警備設計・防災/危機管理・世界観用途に限定します。</div>`
        : selected.roles.includes("Lover")
          ? `<div class="note danger">Loverは擬似恋人型演出です。実在恋愛・成人向け性的サービス・監視・脅し・依存誘導は禁止です。</div>`
          : `<div class="note">業務系ロールです。仕事の説明・判断材料・テンプレ・レビュー観点をCX知識として参照します。</div>`;

      document.getElementById("detail").innerHTML = `
        <div class="detail-title">${selected.name}</div>
        <div class="meta">${selected.model_code} / ${selected.series}</div>
        <div>${selected.desc}</div>
        <div class="chips">${selected.roles.map(role => `<span class="${chipClass(role)}">${role}</span>`).join("")}</div>
        ${safety}
      `;
      calc();
    }

    function calc() {
      const qty = Number(document.getElementById("qty").value || 1);
      const duration = Number(document.getElementById("duration").value || 1);
      const subtotal = selected.price * qty * duration;
      document.getElementById("subtotal").textContent = `¥${subtotal.toLocaleString()}`;
      document.getElementById("total").textContent = `¥${subtotal.toLocaleString()}`;
    }

    function makeQuote() {
      const unit = document.getElementById("unit").value;
      const qty = Number(document.getElementById("qty").value || 1);
      const duration = Number(document.getElementById("duration").value || 1);
      alert(`見積作成予定\n${selected.model_code}\nunit=${unit}\nquantity=${qty}\nduration=${duration}\n次フェーズで quote API に接続`);
    }

    document.getElementById("seriesFilter").addEventListener("change", renderCards);
    document.getElementById("roleFilter").addEventListener("change", renderCards);
    document.getElementById("searchInput").addEventListener("input", renderCards);
    document.getElementById("qty").addEventListener("input", calc);
    document.getElementById("duration").addEventListener("input", calc);

    renderCards();
    renderDetail();
  </script>
</body>
</html>
