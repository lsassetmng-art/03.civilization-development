<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AI Operation Desk Queue Board Stub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../assets/aiod.css">
  <script>
    window.AIOD_API_BASE = "http://127.0.0.1:8787/api/ai-operation-desk";
  </script>
  <script type="module" src="./queue_board_live.js"></script>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <div class="title">Queue Board</div>
        <div class="sub">waiting / ready / running / failed / summary buckets</div>
      </div>
      <div class="toolbar">
        <a class="button secondary" href="./main_console.html">Main Console</a>
      </div>
    </div>

    <div class="card">
      <h3>Queue Buckets</h3>
      <div class="badge">waiting_trigger</div>
      <div class="badge">review_pending</div>
      <div class="badge">approval_pending</div>
      <div class="badge">ready</div>
      <div class="badge">running</div>
      <div class="badge danger">failed_retryable</div>
      <div class="badge warn">failed_manual_attention</div>
      <div class="badge ok">completed_recent</div>
      <div class="badge">summary_waiting</div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Items</h3>
      <ul class="list" id="queueBoardList"></ul>
      <pre id="queueDebugBox" class="surface-box" style="margin-top:16px;"></pre>
    </div>
  </div>
</body>
</html>
