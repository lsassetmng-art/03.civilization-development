<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PocketSecretary Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>PocketSecretary</h1>
      <p>Briefing / Follow-Through Queue / Conversation Actions runtime dashboard</p>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Daily Briefing</h2>
      <div id="dailyBriefing"></div>
    </section>

    <section class="panel">
      <h2>Follow-Through Queue</h2>
      <div id="followThroughQueue"></div>
    </section>

    <section class="panel panel-wide">
      <h2>Conversation Actions</h2>
      <div id="conversationActions"></div>
    </section>

    <section class="panel panel-wide">
      <h2>Summary</h2>
      <div id="summaryBlock"></div>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
