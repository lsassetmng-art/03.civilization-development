<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CommonOS Playground</title>
</head>
<body style="margin:0;background:#020617;">
  <div id="app"></div>
  <script type="module">
    import { renderCommonShell } from '../../CommonShell/src/common-shell.js';
    import { renderSyncPanel } from '../../CommonSyncPresentation/src/common-sync.js';

    const slot = renderCommonShell('#app', {
      title: '12.common-os',
      subtitle: 'playground',
      activeKey: 'dashboard',
      headerTitle: 'CommonOS Playground',
      headerMeta: 'BusinessOS / LifeOS / ERP ready'
    });
    const box = document.createElement('div');
    slot.appendChild(box);
    renderSyncPanel(box, {
      queueCount: 4,
      retryCount: 1,
      conflictCount: 0,
      lastSyncAt: new Date().toISOString()
    });
  </script>
</body>
</html>
