<!doctype html>
<html lang="en" class="cos-variant-standard">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CommonOS Phase C1 Playground</title>
  <link rel="stylesheet" href="../../CommonTokenSet/dist/commonos.tokens.css">
  <link rel="stylesheet" href="../../CommonTokenSet/dist/commonos.variants.css">
  <link rel="stylesheet" href="../../CommonUIRuntime/dist/commonos.components.css">
  <link rel="stylesheet" href="../../CommonShell/dist/commonos.shell.css">
  <link rel="stylesheet" href="../../CommonSyncPresentation/dist/commonos.sync.css">
</head>
<body>
  <div id="app"></div>

  <script src="../../CommonUIRuntime/dist/commonos.runtime.js"></script>
  <script src="../../CommonShell/dist/commonos.shell.js"></script>
  <script src="../../CommonSyncPresentation/dist/commonos.sync.js"></script>
  <script>
    (function () {
      var rt = window.CommonOSRuntime;
      var shell = window.CommonOSShell;
      var sync = window.CommonOSSync;

      var toast = rt.toastHost();
      document.body.appendChild(toast.root);

      var dialog = rt.dialog({
        title: "Reusable dialog",
        body: rt.stack([
          rt.panelNote("Dialog stays reusable. Business decision stays outside the shared foundation."),
          rt.textArea({
            label: "Notes",
            value: "CommonOS provides the reusable shell and controls.",
            helpText: "This is a presentation-only sample."
          })
        ]),
        actions: [
          rt.button({
            label: "Send toast",
            kind: "primary",
            onClick: function () {
              toast.push({
                title: "Toast",
                message: "Reusable toast and dialog are active in the playground."
              });
            }
          })
        ]
      });

      document.body.appendChild(dialog.root);

      var controlsCard = rt.card({
        title: "Minimum reusable component set",
        subtitle: "Phase C1 provider implementation",
        body: rt.stack([
          rt.inline([
            rt.button({
              label: "Primary action",
              kind: "primary",
              onClick: function () {
                toast.push({
                  title: "Primary button",
                  message: "Button component works."
                });
              }
            }),
            rt.button({
              label: "Secondary action",
              kind: "secondary",
              onClick: function () {
                dialog.open();
              }
            }),
            rt.iconButton({
              icon: "⚙",
              label: "Settings",
              showLabel: true,
              ariaLabel: "Open settings"
            }),
            rt.statusChip({
              label: "ready",
              kind: "success"
            })
          ]),
          rt.textField({
            label: "TextField",
            value: "CommonOS shared input",
            helpText: "TextField is part of the minimum reusable set."
          }),
          rt.textArea({
            label: "TextArea",
            value: "Shared HTML UI foundation.",
            helpText: "Accessibility and focus styles are included."
          }),
          rt.selectField({
            label: "Select",
            options: [
              { value: "standard", label: "standard", selected: true },
              { value: "dense", label: "dense" },
              { value: "erp_dense", label: "erp_dense" }
            ]
          }),
          rt.inline([
            rt.checkboxField({ label: "Checkbox", checked: true }),
            rt.switchField({ label: "Switch", checked: false })
          ]),
          rt.radioGroup({
            label: "Radio",
            name: "demo-radio",
            options: [
              { label: "Option A", checked: true },
              { label: "Option B", checked: false }
            ]
          })
        ])
      });

      var listAndTableCard = rt.card({
        title: "List and table",
        subtitle: "Reusable data presentation",
        body: rt.stack([
          rt.list({
            items: [
              "List item one",
              "List item two",
              "List item three"
            ]
          }),
          rt.table({
            columns: ["surface", "state", "boundary"],
            rows: [
              ["Button", "implemented", "presentation only"],
              ["Queue UI", "implemented", "domain meaning excluded"],
              ["App Shell", "implemented", "navigation frame only"]
            ]
          })
        ])
      });

      var queueCardSet = sync.queueGrid([
        { state: "offline", count: 2 },
        { state: "pending", count: 5 },
        { state: "processing", count: 1 },
        { state: "retry_wait", count: 3, onRetry: function () { toast.push({ title: "Retry", message: "Retry entry point invoked." }); } },
        { state: "sent", count: 8 },
        { state: "failed", count: 1, onRetry: function () { toast.push({ title: "Retry", message: "Failed state retry invoked." }); } },
        { state: "conflict", count: 1, onConflict: function () { dialog.open(); } }
      ]);

      var appShell = shell.createShell({
        title: "CommonOS",
        subtitle: "Provider-side playground",
        heroTitle: "Phase C1 provider implementation",
        heroCopy: "Shared UI, shell, token set, queue presentation, and app_common starter are prepared here.",
        navItems: [
          { label: "Overview", href: "#overview", current: true },
          { label: "Components", href: "#components" },
          { label: "Queue UI", href: "#queue" },
          { label: "Boundary", href: "#boundary" }
        ],
        sections: [
          { title: "Reusable controls", body: controlsCard },
          { title: "Reusable list / table", body: listAndTableCard },
          { title: "Queue UI surfaces", body: queueCardSet },
          { title: "Boundary note", body: rt.card({
            title: "CommonOS boundary",
            subtitle: "Important split",
            body: rt.stack([
              rt.panelNote("Queue presentation may be shared. Queue business meaning remains in the owning domain."),
              rt.panelNote("Pricing, entitlement, approval, accounting, inventory, payload canon, and secrets stay outside CommonOS.")
            ])
          }) }
        ]
      });

      rt.mount(document.getElementById("app"), appShell);
    })();
  </script>
</body>
</html>
