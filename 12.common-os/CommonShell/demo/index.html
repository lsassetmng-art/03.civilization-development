<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CommonShell Demo</title>
</head>
<body style="margin:0;background:#020617;">
  <div id="app"></div>
  <script type="module">
    import { renderCommonShell } from '../src/common-shell.js';

      title: '12.common-os',
      subtitle: 'shared shell runtime',
      activeKey: 'dashboard'

      <p style="margin:0;">Use this app folder as the reusable shell basis for BusinessOS / LifeOS / ERP.</p>
    `;
  </script>
