<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CommonOS Demo</title>
    <script type="module" src="../dist/commonos.js"></script>
    <style>
      body {
        margin: 0;
        background: #020617;
      }
      .nav-stack, .header-actions, .grid {
        display: grid;
        gap: 12px;
      }
      .header-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .two-col {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      @media (max-width: 900px) {
        .two-col { grid-template-columns: 1fr; }
      }
      .inline {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .table-note {
        color: #94a3b8;
        font: 14px/1.4 system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <co-app-shell title="CommonOS Runtime" subtitle="Phase-1 shared foundation demo">
      <div slot="nav" class="nav-stack">
        <co-button variant="secondary">Dashboard</co-button>
        <co-button variant="ghost">Approvals</co-button>
        <co-button variant="ghost">Attachments</co-button>
        <co-button variant="ghost">Settings</co-button>
      </div>

      <div slot="header-actions" class="header-actions">
        <co-status-chip tone="info" label="shared-ui"></co-status-chip>
        <co-button variant="secondary" id="open-dialog">Open dialog</co-button>
      </div>

      <div class="grid">
        <div class="two-col">
          <co-card title="Controls">
            <div class="grid">
              <div class="inline">
                <co-button>Primary</co-button>
                <co-button variant="secondary">Secondary</co-button>
                <co-button variant="ghost">Ghost</co-button>
                <co-button variant="destructive">Delete</co-button>
              </div>
              <co-text-field label="Project name" placeholder="CommonOS phase-1" hint="Shared TextField"></co-text-field>
              <co-text-field label="ERP dense code" variant="erp_dense" placeholder="A-1001"></co-text-field>
              <co-text-area label="Notes" placeholder="Business canon stays outside CommonOS"></co-text-area>
              <co-select
                label="Priority"
                value="a"
                options='[{"value":"a","label":"Priority A"},{"value":"b","label":"Priority B"},{"value":"c","label":"Priority C"}]'
              ></co-select>
              <div class="inline">
                <co-checkbox label="Enable offline queue" checked></co-checkbox>
                <co-switch label="Dense mode"></co-switch>
              </div>
            </div>
          </co-card>

          <co-card title="Sync and queue presentation">
            <div class="grid">
              <co-queue-status status="retry_wait" count="4" last-sync="2026-04-22 05:40 JST" message="Waiting for connectivity recovery." retryable></co-queue-status>
              <co-sync-retry offline pending="4" failed="1" conflict="1" next-retry-at="2026-04-22 05:45 JST"></co-sync-retry>
              <co-conflict-panel title="Draft conflict" summary="This is a shared conflict shell. Final merge meaning stays domain-owned."></co-conflict-panel>
            </div>
          </co-card>
        </div>

        <div class="two-col">
          <co-card title="State panel and list">
            <div class="grid">
              <co-state-panel state="loading" title="Sync in progress" message="Presentation is shared. Send meaning remains domain-owned."></co-state-panel>
              <co-list>
                <co-list-item>Shared shell primitive</co-list-item>
                <co-list-item>Shared queue visibility</co-list-item>
                <co-list-item>Shared density variant</co-list-item>
              </co-list>
            </div>
          </co-card>

          <co-card title="Table wrapper">
            <div class="table-note">Business data is sample-only.</div>
            <co-table>
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Status</th>
                  <th>Owner</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Shell</td>
                  <td>Implemented</td>
                  <td>CommonOS</td>
                </tr>
                <tr>
                  <td>Queue UI</td>
                  <td>Implemented</td>
                  <td>CommonOS</td>
                </tr>
                <tr>
                  <td>Pricing engine</td>
                  <td>Out of scope</td>
                  <td>Domain</td>
                </tr>
              </tbody>
            </co-table>
          </co-card>
        </div>
      </div>

      <co-dialog id="demo-dialog" title="Apply CommonOS variant" description="Use variants instead of forking per OS." confirm-label="Apply" cancel-label="Close">
        <co-text-field label="Variant key" value="input.erp_dense"></co-text-field>
      </co-dialog>

      <co-toast-stack id="toast-stack"></co-toast-stack>
    </co-app-shell>

    <script type="module">
      import { createToastItems } from '../dist/commonos.js';

      const dialog = document.getElementById('demo-dialog');
      const toast = document.getElementById('toast-stack');
      const opener = document.getElementById('open-dialog');

      opener.addEventListener('co-click', () => {
        dialog.setAttribute('open', 'true');
      });

      dialog.addEventListener('co-confirm', () => {
        toast.setAttribute('items', createToastItems([
          { title: 'Variant applied', message: 'CommonOS shared variant path selected.' }
        ]));
      });
    </script>
  </body>
</html>
