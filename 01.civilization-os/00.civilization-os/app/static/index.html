<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CivilizationOS</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <h1>CivilizationOS</h1>
      <p class="subtitle">Local prototype shell running on Termux.</p>
      <div class="hero__actions">
        <button id="reloadButton">Reload</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Health</h2>
      <div id="healthBox" class="status">Loading...</div>
    </section>

    <section class="panel">
      <h2>System</h2>
      <div id="systemBox" class="kv-list"></div>
    </section>

    <section class="panel">
      <h2>Modules</h2>
      <div id="modulesBox" class="card-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <span>Prototype base for CivilizationOS</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
